databaseChangeLog:
  - changeSet:
      id: 1-create-bank-core-tables
      author: bank_developer
      comment: Создание таблиц пользователей, ролей и банковских карт
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: 'ACTIVE'
                  constraints:
                    nullable: false

        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: role_name
                  type: varchar(20)
                  constraints:
                    nullable: false

        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: card_number_encrypted
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expiration_date
                  type: varchar(5)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: numeric(15, 2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_user
            onDelete: RESTRICT

        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_name
            constraintName: pk_user_roles

  - changeSet:
      id: 2-insert-default-users
      author: bank_developer
      comment: Добавление администратора и пользователя по умолчанию
      changes:
        - insert:
            tableName: users
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: username, value: 'admin' }
              - column: { name: password, value: '$2a$10$Sg.evAa4iTKxpAvPM.tU.ubiURC2bsIbL3MX27TK96BXn.uV5o96.' }
              - column: { name: email, value: 'admin@example.com' }
              - column: { name: status, value: 'ACTIVE' }
        - insert:
            tableName: user_roles
            columns:
              - column: { name: user_id, valueNumeric: 1 }
              - column: { name: role_name, value: 'ROLE_ADMIN' }

        - insert:
            tableName: users
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: username, value: 'user1' }
              - column: { name: password, value: '$2a$10$UClAynj6Ntw.U9mf64KlTO0gDwBD1Hx1F8RqwflXKA2ihs0UZhQ9O' }
              - column: { name: email, value: 'user1@example.com' }
              - column: { name: status, value: 'ACTIVE' }
        - insert:
            tableName: user_roles
            columns:
              - column: { name: user_id, valueNumeric: 2 }
              - column: { name: role_name, value: 'ROLE_USER' }
